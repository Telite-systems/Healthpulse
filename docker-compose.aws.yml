version: '3.8'

services:
  backend:
    build:
      context: ./healthcare-backend
      dockerfile: Dockerfile
    container_name: healthpulse-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_VERSION=${APP_VERSION}
      - DEBUG=${DEBUG}
      - HOST=${HOST}
      - PORT=${PORT}
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./healthcare-app
      dockerfile: Dockerfile
    container_name: healthpulse-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_started
      n8n:
        condition: service_started

  n8n:
    image: n8nio/n8n:latest
    container_name: healthpulse-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_TUNNEL_URL}
      - N8N_RUNNERS_DISABLED=true
      - N8N_SECURE_COOKIE=false
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  n8n-init:
    image: n8nio/n8n:latest
    container_name: healthpulse-n8n-init
    depends_on:
      n8n:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n workflow:/workflows:ro
      - ./init-n8n-workflows.sh:/init-n8n-workflows.sh:ro
    entrypoint: ["/bin/sh", "/init-n8n-workflows.sh"]
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - NODE_ENV=production
    restart: "no"

volumes:
  n8n_data:
