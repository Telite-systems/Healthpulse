version: '3.8'

services:
  backend:
    build:
      context: ./healthcare-backend
      dockerfile: Dockerfile
    container_name: healthpulse-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./healthcare-backend/.env
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./healthcare-app
      dockerfile: Dockerfile
    container_name: healthpulse-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    container_name: healthpulse-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  n8n:
    image: n8nio/n8n:latest
    container_name: healthpulse-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_TUNNEL_URL=http://localhost:5678/
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n\ workflow:/home/node/.n8n/workflows
    depends_on:
      - mongodb

volumes:
  mongodb_data:
  n8n_data:
