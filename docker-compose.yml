version: '3.8'

services:
  backend:
    build:
      context: ./healthcare-backend
      dockerfile: Dockerfile
    container_name: healthpulse-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./healthcare-backend/.env
    environment:
      # Override CORS to include Docker frontend origin
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://localhost,http://localhost:80,https://telitesystems.online}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./healthcare-app
      dockerfile: Dockerfile
    container_name: healthpulse-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_started
      n8n:
        condition: service_started

  n8n:
    image: n8nio/n8n:latest
    container_name: healthpulse-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${EC2_PUBLIC_IP:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_TUNNEL_URL:-http://localhost:5678/}
      - N8N_RUNNERS_DISABLED=true
      - N8N_SECURE_COOKIE=false
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
      # Claude / Anthropic API key for AI workflows
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Skip owner setup for local dev — allows API/CLI access without auth
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Auto-import n8n workflows on startup ──────────────────────────────────
  n8n-init:
    image: n8nio/n8n:latest
    container_name: healthpulse-n8n-init
    depends_on:
      n8n:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n workflow:/workflows:ro
      - ./init-n8n-workflows.sh:/init-n8n-workflows.sh:ro
    entrypoint: ["/bin/sh", "/init-n8n-workflows.sh"]
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    restart: "no"

volumes:
  n8n_data:
