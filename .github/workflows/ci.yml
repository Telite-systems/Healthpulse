# ============================================================
# HealthPulse — Continuous Integration
# ============================================================
# Runs on every push and pull request.
# Jobs: lint-backend (advisory), lint-frontend (advisory),
#        build-frontend, test-backend, docker-build
#
# Lint jobs are advisory — they report issues but never
# block the deploy. Only build/test/docker are hard gates.
# ============================================================

name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_call:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python Lint (advisory) ───────────────────────────────────
  lint-backend:
    name: 🐍 Lint Backend
    runs-on: ubuntu-latest
    continue-on-error: true        # ← never blocks deploy
    defaults:
      run:
        working-directory: healthcare-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (advisory)
        run: |
          flake8 app/ \
            --max-line-length=150 \
            --extend-ignore=E501,W503,E302,E303,E231,W291,W293,F841 \
            --exclude=__pycache__,venv,.venv,migrations \
            --count --statistics || true

  # ── Frontend Lint (advisory) ─────────────────────────────────
  lint-frontend:
    name: ⚡ Lint Frontend
    runs-on: ubuntu-latest
    continue-on-error: true        # ← never blocks deploy
    defaults:
      run:
        working-directory: healthcare-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Run ESLint (advisory)
        run: npm run lint || true

  # ── Frontend Build (hard gate) ───────────────────────────────
  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: healthcare-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build (Vite + TypeScript)
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed — dist/ directory not found"
            exit 1
          fi
          echo "✅ Build successful — dist/ contains $(find dist -type f | wc -l) files"

  # ── Backend Tests (hard gate) ────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: healthcare-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: healthcare-backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          # Provide dummy env vars so app config doesn't crash on import
          MONGODB_URL: "mongodb://localhost:27017"
          MONGODB_DB_NAME: "healthpulse_test"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
          JWT_ALGORITHM: "HS256"
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          CORS_ORIGINS: "http://localhost"
          APP_NAME: "HealthPulse CI"
          APP_VERSION: "0.0.0-ci"
          DEBUG: "True"
          HOST: "0.0.0.0"
          PORT: "8000"
          LOG_LEVEL: "DEBUG"
        run: |
          if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' | head -1)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "⚠️  No tests found in tests/ — skipping"
            echo "💡 Add test files to healthcare-backend/tests/ to enable CI testing"
          fi

  # ── Docker Build Smoke Test (hard gate) ───────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t healthpulse-backend:ci ./healthcare-backend

      - name: Build frontend image
        run: docker build -t healthpulse-frontend:ci ./healthcare-app

      - name: Verify images
        run: |
          echo "✅ Built images:"
          docker images --filter "reference=healthpulse-*" --format "  {{.Repository}}:{{.Tag}} — {{.Size}}"
